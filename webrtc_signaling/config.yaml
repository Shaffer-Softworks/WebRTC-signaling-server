# https://developers.home-assistant.io/docs/add-ons/configuration
name: WebRTC Signaling Server
version: "1.3.1"
slug: webrtc_signaling
description: WebRTC signaling server for LAN intercom with dashboard. Replaces Node-RED signaling flow; compatible with existing clients (register, offer/answer/candidate, hangup, clientsList).
url: "https://github.com/Shaffer-Softworks/WebRTC-signaling-server/tree/main/webrtc_signaling"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ports:
  "8765/tcp": 8765
ports_description:
  "8765/tcp": "WebSocket signaling and dashboard"
# Opens dashboard in browser from add-on Info (uses mapped host port for 8765/tcp).
webui: http://[HOST]:[PORT:8765]/
map: []
options:
  port: 8765
  openobserve_url: ""
  openobserve_username: ""
  openobserve_password: ""
schema:
  port: "int(1,65535)?"
  openobserve_url: "str?"
  openobserve_username: "str?"
  openobserve_password: "password?"
